<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Bank — Kitchen Dashboard</title>
    <meta name="description" content="Real-time kitchen order management dashboard for Food Bank restaurant.">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body style="opacity: 0; transition: opacity 0.3s ease;">

    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-left">
            <img src="./assets/food_bank_logo.jpg" alt="Food Bank" class="header-logo">
            <div>
                <div class="header-title">Food Bank Dashboard</div>
                <div class="header-subtitle">Kitchen Order Management</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-time" id="headerTime">--:--:--</div>
            <div class="connection-status">
                <div class="connection-dot"></div>
                <span>Live</span>
            </div>
            <button onclick="clearDelivered()" class="btn-logout" style="background: rgba(46, 213, 115, 0.1); border: 1px solid var(--status-ready); color: var(--status-ready); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; font-family: var(--font-main); transition: background 0.2s; margin-right: 8px;">🧹 Clear Delivered</button>
            <button id="logoutBtn" class="btn-logout" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-white); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; font-family: var(--font-main); transition: background 0.2s;">Sign Out</button>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar">
        <div class="stat-card stat-new">
            <div class="stat-label">New Orders</div>
            <div class="stat-value" id="statNew">0</div>
            <div class="stat-icon">🆕</div>
        </div>
        <div class="stat-card stat-cooking">
            <div class="stat-label">Cooking</div>
            <div class="stat-value" id="statCooking">0</div>
            <div class="stat-icon">🔥</div>
        </div>
        <div class="stat-card stat-ready">
            <div class="stat-label">Ready</div>
            <div class="stat-value" id="statReady">0</div>
            <div class="stat-icon">✅</div>
        </div>
        <div class="stat-card stat-delivered">
            <div class="stat-label">Delivered</div>
            <div class="stat-value" id="statDelivered">0</div>
            <div class="stat-icon">🍽️</div>
        </div>
    </section>

    <!-- Kanban Board -->
    <section class="kanban-board">
        <!-- New Orders Column -->
        <div class="kanban-column col-new">
            <div class="column-header">
                <div class="column-title"><span class="column-title-icon">🆕</span> New Orders</div>
                <div class="column-count" id="countNew">0</div>
            </div>
            <div class="column-body" id="colNew"></div>
        </div>

        <!-- Cooking Column -->
        <div class="kanban-column col-cooking">
            <div class="column-header">
                <div class="column-title"><span class="column-title-icon">🔥</span> Cooking</div>
                <div class="column-count" id="countCooking">0</div>
            </div>
            <div class="column-body" id="colCooking"></div>
        </div>

        <!-- Ready Column -->
        <div class="kanban-column col-ready">
            <div class="column-header">
                <div class="column-title"><span class="column-title-icon">✅</span> Ready</div>
                <div class="column-count" id="countReady">0</div>
            </div>
            <div class="column-body" id="colReady"></div>
        </div>

        <!-- Delivered Column -->
        <div class="kanban-column col-delivered">
            <div class="column-header">
                <div class="column-title"><span class="column-title-icon">🍽️</span> Delivered</div>
                <div class="column-count" id="countDelivered">0</div>
            </div>
            <div class="column-body" id="colDelivered"></div>
        </div>
    </section>

    <!-- Toast Notification -->
    <div class="dashboard-toast" id="dashToast">
        <div class="toast-icon">🔔</div>
        <div class="toast-content">
            <div class="toast-title" id="toastTitle">New Order!</div>
            <div class="toast-subtitle" id="toastSubtitle">Order details</div>
        </div>
    </div>

    <!-- Audio notification -->
    <audio id="notifSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRl9vT19teleWQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==" type="audio/wav">
    </audio>

    <script type="module">
        import { db, ref, onValue, update, remove, auth, onAuthStateChanged, signOut } from './firebase-config.js';

        // --- Auth Protection ---
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace('login.html');
            } else {
                document.body.style.opacity = '1';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace('login.html');
            });
        });

        // --- State ---
        let allOrders = {};
        let initialLoad = true;

        // --- Clock ---
        function updateClock() {
            const now = new Date();
            document.getElementById('headerTime').textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Toast ---
        function showDashToast(title, subtitle) {
            const toast = document.getElementById('dashToast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastSubtitle').textContent = subtitle;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // --- Build Order Card HTML ---
        function buildOrderCard(key, order) {
            const status = order.status || 'new';
            const items = order.items || [];
            const isSingleItem = !Array.isArray(items) || items.length === 0;

            let itemsHtml = '';
            if (isSingleItem) {
                // Legacy single-item order
                itemsHtml = `
                    <div class="order-item-row">
                        <span class="order-item-name">${order.item || 'Unknown'}<span class="order-item-qty"> x1</span></span>
                        <span class="order-item-price">${order.price || '0'} Birr</span>
                    </div>`;
            } else {
                items.forEach(it => {
                    const price = (it.price * (it.quantity || 1)).toFixed(2);
                    itemsHtml += `
                        <div class="order-item-row">
                            <span class="order-item-name">${it.name}<span class="order-item-qty"> x${it.quantity || 1}</span></span>
                            <span class="order-item-price">${price} Birr</span>
                        </div>`;
                });
            }

            const totalPrice = order.totalPrice
                ? parseFloat(order.totalPrice).toFixed(2)
                : (order.price ? order.price.replace('$', '') : '0.00');

            let actionBtn = '';
            if (status === 'new') {
                actionBtn = `<button class="order-action-btn btn-start-cooking" onclick="updateStatus('${key}', 'cooking')">🔥 Start Cooking</button>`;
            } else if (status === 'cooking') {
                actionBtn = `<button class="order-action-btn btn-mark-ready" onclick="updateStatus('${key}', 'ready')">✅ Mark Ready</button>`;
            } else if (status === 'ready') {
                actionBtn = `<button class="order-action-btn btn-mark-delivered" onclick="updateStatus('${key}', 'delivered')">🍽️ Mark Delivered</button>`;
            }

            let assistanceHtml = '';
            if (order.needsAssistance && status !== 'delivered') {
                assistanceHtml = `
                    <div class="assistance-banner">
                        <span>🔔 Waiter Needed!</span>
                        <button onclick="clearAssistance('${key}')" class="btn-clear-assistance">Clear</button>
                    </div>`;
            }

            return `
                <div class="order-card status-${status}" id="card-${key}">
                    ${assistanceHtml}
                    <div class="order-card-header">
                        <div class="order-number">#${order.orderNumber || '----'}</div>
                        <div class="table-badge">Table ${order.tableNumber || '—'}</div>
                    </div>
                    <div class="order-items-list">${itemsHtml}</div>
                    <div class="order-total">
                        <span class="order-total-label">Total</span>
                        <span class="order-total-value">${totalPrice} Birr</span>
                    </div>
                    <div class="order-time">🕐 ${order.time || ''}</div>
                    ${actionBtn}
                </div>`;
        }

        // --- Render All Orders ---
        function renderOrders() {
            const columns = { new: [], cooking: [], ready: [], delivered: [] };

            Object.entries(allOrders).forEach(([key, order]) => {
                const status = order.status || 'new';
                if (columns[status]) {
                    columns[status].push({ key, order });
                }
            });

            // Sort each column by timestamp (newest first for new, oldest first for others)
            columns.new.sort((a, b) => (b.order.timestamp || 0) - (a.order.timestamp || 0));
            columns.cooking.sort((a, b) => (a.order.timestamp || 0) - (b.order.timestamp || 0));
            columns.ready.sort((a, b) => (a.order.timestamp || 0) - (b.order.timestamp || 0));
            columns.delivered.sort((a, b) => (b.order.timestamp || 0) - (a.order.timestamp || 0));

            const emptyStates = {
                new: '<div class="empty-column"><div class="empty-icon">📭</div><div class="empty-text">No new orders</div></div>',
                cooking: '<div class="empty-column"><div class="empty-icon">👨‍🍳</div><div class="empty-text">Nothing cooking</div></div>',
                ready: '<div class="empty-column"><div class="empty-icon">🍽️</div><div class="empty-text">No ready orders</div></div>',
                delivered: '<div class="empty-column"><div class="empty-icon">✨</div><div class="empty-text">No deliveries yet</div></div>'
            };

            ['new', 'cooking', 'ready'].forEach(status => {
                const colEl = document.getElementById('col' + status.charAt(0).toUpperCase() + status.slice(1));
                if (columns[status].length === 0) {
                    colEl.innerHTML = emptyStates[status];
                } else {
                    colEl.innerHTML = columns[status].map(({ key, order }) => buildOrderCard(key, order)).join('');
                }
            });

            // For delivered, we hide the cards to save space but keep the total numbers
            const colDeliveredEl = document.getElementById('colDelivered');
            if (columns.delivered.length > 0) {
                colDeliveredEl.innerHTML = `<div class="empty-column"><div class="empty-icon">🎉</div><div class="empty-text">${columns.delivered.length} orders delivered today</div></div>`;
            } else {
                colDeliveredEl.innerHTML = emptyStates.delivered;
            }

            // Update counts
            document.getElementById('countNew').textContent = columns.new.length;
            document.getElementById('countCooking').textContent = columns.cooking.length;
            document.getElementById('countReady').textContent = columns.ready.length;
            document.getElementById('countDelivered').textContent = columns.delivered.length;

            document.getElementById('statNew').textContent = columns.new.length;
            document.getElementById('statCooking').textContent = columns.cooking.length;
            document.getElementById('statReady').textContent = columns.ready.length;
            document.getElementById('statDelivered').textContent = columns.delivered.length;
        }

        // --- Update Order Status ---
        window.updateStatus = async function(key, newStatus) {
            try {
                const orderRef = ref(db, `orders/${key}`);
                await update(orderRef, { status: newStatus });
            } catch (err) {
                console.error('Failed to update status:', err);
            }
        };

        window.clearAssistance = async function(key) {
            try {
                const orderRef = ref(db, `orders/${key}`);
                await update(orderRef, { needsAssistance: false });
            } catch (err) {
                console.error('Failed to clear assistance:', err);
            }
        };

        window.clearDelivered = async function() {
            const deliveredKeys = Object.entries(allOrders)
                .filter(([key, order]) => order.status === 'delivered' || order.status === 'cancelled')
                .map(([key]) => key);
                
            if (deliveredKeys.length === 0) {
                alert('No delivered or cancelled orders to clear!');
                return;
            }

            if (confirm(`Are you sure you want to clear ${deliveredKeys.length} completed orders? This will reset the counter.`)) {
                try {
                    const promises = deliveredKeys.map(key => remove(ref(db, `orders/${key}`)));
                    await Promise.all(promises);
                    showDashToast('Cleared!', 'All completed orders have been removed.');
                } catch (err) {
                    console.error('Failed to clear orders:', err);
                    alert('Failed to clear orders. Please check connection.');
                }
            }
        };

        // --- Listen to Firebase ---
        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val() || {};
            const prevOrders = { ...allOrders };
            allOrders = data;
            renderOrders();

            // Detect new orders and waiter calls
            if (!initialLoad) {
                Object.keys(data).forEach(k => {
                    const order = data[k];
                    if (!prevOrders[k]) {
                        showDashToast(
                            `New Order #${order.orderNumber || ''}`,
                            `Table ${order.tableNumber || '—'} • ${order.totalPrice ? order.totalPrice.toFixed(2) + ' Birr' : order.price || ''}`
                        );
                        const audio = document.getElementById('notifSound');
                        if(audio) audio.play().catch(e=>console.log("Audio play blocked",e));
                    } else if (order.needsAssistance && !prevOrders[k].needsAssistance) {
                        showDashToast(
                            `🔔 Waiter Needed!`,
                            `Table ${order.tableNumber || '—'} (Order #${order.orderNumber || ''})`
                        );
                        const audio = document.getElementById('notifSound');
                        if(audio) audio.play().catch(e=>console.log("Audio play blocked",e));
                    }
                });
            }
            initialLoad = false;
        });
    </script>
</body>
</html>
