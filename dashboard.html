<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Union - Kitchen Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #05070A;
            margin: 0;
            padding: 0;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-navbar {
            background: #0D0F14;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1A1D23;
        }

        .navbar-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            letter-spacing: 2px;
        }

        .navbar-brand span {
            color: #555;
            font-size: 0.8rem;
            margin-left: 10px;
            font-weight: 400;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .qr-pass {
            background: #1A1F2B;
            border: 1px solid #2B3A55;
            padding: 5px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .qr-label {
            color: #8E9AAF;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .qr-value {
            color: #5B9AFF;
            font-weight: 700;
        }

        .btn-reset {
            background: #2B3A55;
            border: none;
            color: #5B9AFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .time-display {
            color: #333;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-logout {
            background: #1A1D23;
            border: 1px solid #2A2D35;
            color: #8E9AAF;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .columns-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .status-col {
            background: #0D0F14;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .col-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-width: 3px;
            border-bottom-style: solid;
        }

        .col-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-count {
            color: #555;
            font-size: 1rem;
            border: 2px solid #222;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        /* Colors per column */
        .col-new {
            border-bottom-color: #E67E22;
        }

        .col-prep {
            border-bottom-color: #3498DB;
        }

        .col-ready {
            border-bottom-color: #2ECC71;
        }

        .order-card {
            background: #15181F;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #1F2228;
            cursor: grab;
        }

        .order-card.dragging {
            opacity: 0.5;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .card-item-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .card-time {
            font-size: 0.75rem;
            color: #555;
        }

        .card-body {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-body img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
        }

        .card-btn {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-move {
            background: #2B3A55;
            color: #5B9AFF;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <nav class="top-navbar">
            <div class="navbar-brand">UNION <span>KITCHEN DISPLAY</span></div>
            <div class="navbar-actions">
                <div class="qr-pass">
                    <span class="qr-label">QR PASS</span>
                    <span class="qr-value">bear48</span>
                    <button class="btn-reset">↺ Reset</button>
                </div>
                <div class="time-display" id="live-time">12:00 PM</div>
                <button class="btn-logout">Logout</button>
            </div>
        </nav>

        <div class="columns-container">
            <!-- New Orders -->
            <div class="status-col col-new">
                <div class="col-header">
                    <div class="col-title">🔥 New Orders</div>
                    <div id="count-new" class="order-count">0</div>
                </div>
                <div id="list-new" class="order-list" data-status="new"></div>
            </div>

            <!-- Preparing -->
            <div class="status-col col-prep">
                <div class="col-header">
                    <div class="col-title">🍳 Preparing</div>
                    <div id="count-prep" class="order-count">0</div>
                </div>
                <div id="list-prep" class="order-list" data-status="prep"></div>
            </div>

            <!-- Ready -->
            <div class="status-col col-ready">
                <div class="col-header">
                    <div class="col-title">🔔 Ready</div>
                    <div id="count-ready" class="order-count">0</div>
                </div>
                <div id="list-ready" class="order-list" data-status="ready"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue, update, remove, onChildAdded, onChildChanged, onChildRemoved } from './firebase-config.js';

        // Notification sound
        const bellSound = new Audio('https://actions.google.com/sounds/v1/cartoon/bell_ding.ogg');
        let initialDataLoaded = false;
        setTimeout(() => { initialDataLoaded = true; }, 2000);

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-time').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        function loadOrders() {
            const ordersRef = ref(db, 'orders');

            onChildAdded(ordersRef, (snapshot) => {
                const order = snapshot.val();
                if (order.status === 'archived') return;

                createCard(snapshot.key, order);
                updateCounts();

                if (initialDataLoaded && order.status === 'new') {
                    bellSound.currentTime = 0;
                    bellSound.play().catch(e => console.log('Audio blocked:', e));
                }
            });

            onChildChanged(ordersRef, (snapshot) => {
                const order = snapshot.val();
                const card = document.getElementById('order-' + snapshot.key);
                if (card) {
                    if (order.status === 'archived') {
                        card.remove();
                    } else {
                        const list = document.getElementById(`list-${order.status}`);
                        if (list && card.parentElement !== list) {
                            list.appendChild(card);
                        }
                    }
                }
                updateCounts();
            });

            onChildRemoved(ordersRef, (snapshot) => {
                const card = document.getElementById('order-' + snapshot.key);
                if (card) card.remove();
                updateCounts();
            });
        }

        function createCard(key, order) {
            const list = document.getElementById(`list-${order.status}`);
            if (!list) return;

            const card = document.createElement('div');
            card.className = 'order-card';
            card.id = 'order-' + key;
            card.draggable = true;

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-item-name">${order.item}</span>
                    <span class="card-time">${order.time}</span>
                </div>
                <div class="card-body">
                    <img src="${order.img}" alt="${order.item}">
                    <div style="font-size: 0.85rem; color: #AAA;">
                        TBL ${order.table || '?'}<br>
                        #${order.orderNumber || '?'}
                    </div>
                </div>
                <div class="card-actions">
                    ${order.status === 'new' ? `<button class="card-btn btn-move" onclick="updateStatus('${key}', 'prep')">Start Prep</button>` : ''}
                    ${order.status === 'prep' ? `<button class="card-btn btn-move" onclick="updateStatus('${key}', 'ready')">Mark Ready</button>` : ''}
                    ${order.status === 'ready' ? `<button class="card-btn btn-move" style="background: #1A3C2A; color: #2ECC71;" onclick="updateStatus('${key}', 'archived')">Finish</button>` : ''}
                </div>
            `;

            list.appendChild(card);
            addDragListeners(card);
        }

        function addDragListeners(card) {
            card.addEventListener('dragstart', () => card.classList.add('dragging'));
            card.addEventListener('dragend', () => card.classList.remove('dragging'));
        }

        const lists = document.querySelectorAll('.order-list');
        lists.forEach(list => {
            list.addEventListener('dragover', e => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                if (dragging) list.appendChild(dragging);
            });

            list.addEventListener('drop', e => {
                const dragging = document.querySelector('.dragging');
                if (dragging) {
                    const key = dragging.id.replace('order-', '');
                    const newStatus = list.dataset.status;
                    updateStatus(key, newStatus);
                }
            });
        });

        function updateCounts() {
            ['new', 'prep', 'ready'].forEach(status => {
                const count = document.querySelectorAll(`#list-${status} .order-card`).length;
                const countEl = document.getElementById(`count-${status}`);
                if (countEl) countEl.innerText = count;
            });
        }

        async function updateStatus(key, newStatus) {
            try {
                await update(ref(db, `orders/${key}`), { status: newStatus });
            } catch (error) {
                console.error("Error updating status:", error);
            }
        }

        window.updateStatus = updateStatus;
        loadOrders();
    </script>
</body>

</html>
