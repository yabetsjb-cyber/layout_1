<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Login — Food Bank</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-dark);
            margin: 0;
            font-family: var(--font-main);
        }
        .login-box {
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .login-logo {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .login-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--primary-red);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .error-msg {
            color: #ff4757;
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="./assets/food_bank_logo.jpg" alt="Logo" class="login-logo" onerror="this.style.display='none'">
        <div class="login-title">Kitchen Portal</div>
        <div class="login-subtitle">Sign in to manage orders</div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="admin@foodbank.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div class="error-msg" id="errorMsg">Invalid credentials.</div>
        </form>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from './firebase-config.js';

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error("Login error:", error);
                // Clean up the firebase error message to look nicer
                let msg = "Invalid credentials. Please try again.";
                if (error.code === 'auth/invalid-credential') msg = "Incorrect email or password.";
                else if (error.code === 'auth/too-many-requests') msg = "Too many attempts. Try again later.";
                
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
