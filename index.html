<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Bank - Digital Menu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header style="height: 60px;">
            <div class="back-icon" style="visibility: hidden;">←</div>
            <div class="logo-space" style="flex: 1;"></div>
            <div class="menu-space" style="width: 24px;"></div>
        </header>

        <section class="hero">
            <!-- Using the generated hero banner -->
            <img src="./assets/hero_food_banner.png" alt="Different Kind of Food">
            <div class="hero-overlay">
                <h1 class="hero-title">Different<br>Kind of Food</h1>
            </div>
        </section>

        <section class="category-section">
            <div class="section-title">Food Category</div>
            <!-- Breakfast & Lunch Row -->
            <div class="grid-wrapper two-cols" style="margin-bottom: 15px;">
                <div class="card food-item-grid" onclick="showModal('Breakfast')">
                    <img src="https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?q=80&w=200&auto=format&fit=crop"
                        alt="Breakfast" class="img-fluid">
                    <p class="text-sm">Breakfast</p>
                </div>
                <div class="card food-item-grid" onclick="showModal('Lunch')">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=200&auto=format&fit=crop"
                        alt="Lunch" class="img-fluid">
                    <p class="text-sm">Lunch</p>
                </div>
            </div>
            <!-- Snacks & Dinner Row -->
            <div class="grid-wrapper two-cols">
                <div class="card food-item-grid" onclick="showModal('Snack')">
                    <img src="./Snack/1.jpg" alt="Snack" class="img-fluid">
                    <p class="text-sm">Snacks</p>
                </div>
                <div class="card food-item-grid" onclick="showModal('Dinner')">
                    <img src="./Dinner/1.jpg" alt="Dinner" class="img-fluid">
                    <p class="text-sm">Dinner</p>
                </div>
            </div>
        </section>

        <section class="category-section">
            <div class="section-title">Drinks Category</div>
            <div class="grid-wrapper two-cols">
                <div class="card food-item-grid" onclick="showModal('Soft Drinks')">
                    <img src="./Softdrink/1.jpg" alt="Soft" class="img-fluid">
                    <p class="text-sm">Soft Drinks</p>
                </div>
                <div class="card food-item-grid" onclick="showModal('Hot Drinks')">
                    <img src="./Hotdrink/1.jpg" alt="Hot" class="img-fluid">
                    <p class="text-sm">Hot Drinks</p>
                </div>
            </div>
        </section>
        <section class="discount-banner">
            <div class="discount-text">
                <h2>15%<br><span style="font-size: 0.9rem; font-weight: 400;">Discount</span></h2>
                <p style="font-size: 0.7rem;">From Our Store</p>
            </div>
            <div class="discount-img">
                <img src="https://images.unsplash.com/photo-1517741991040-91338b176129?q=80&w=200&auto=format&fit=crop"
                    alt="Pancakes">
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div id="categoryModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title">Category Title</h2>
            <div id="modalItems" class="modal-item-list">
                <!-- Items injected here -->
            </div>
        </div>
    </div>


    <script type="module">
        import { db, ref, push, set } from './firebase-config.js';

        const menuData = {
            'Breakfast': [
                { name: 'Classic Pancakes', price: '$12.00', img: './Breakfast/1.jpg' },
                { name: 'Omelet Special', price: '$10.00', img: './Breakfast/1.jpg' },
                { name: 'Omelet Special', price: '$10.00', img: './Breakfast/1.jpg' },
                { name: 'Omelet Special', price: '$10.00', img: './Breakfast/1.jpg' },
                { name: 'Omelet Special', price: '$10.00', img: './Breakfast/1.jpg' },
            ],
            'Lunch': [
                { name: 'Chicken Salad', price: '$15.00', img: './Lunch/1.jpg' },
                { name: 'Club Sandwich', price: '$14.00', img: './Lunch/1.jpg' },
                { name: 'Club Sandwich', price: '$14.00', img: './Lunch/1.jpg' },
                { name: 'Club Sandwich', price: '$14.00', img: './Lunch/1.jpg' },
                { name: 'Club Sandwich', price: '$14.00', img: './Lunch/1.jpg' },
            ],
            'Snack': [
                { name: 'French Fries', price: '$8.00', img: './Snack/1.jpg' },
                { name: 'Chicken Wings', price: '$12.00', img: './Snack/1.jpg' },
                { name: 'French Fries', price: '$8.00', img: './Snack/1.jpg' },
                { name: 'Chicken Wings', price: '$12.00', img: './Snack/1.jpg' },
                { name: 'French Fries', price: '$8.00', img: './Snack/1.jpg' },
                { name: 'Chicken Wings', price: '$12.00', img: './Snack/1.jpg' },
            ],
            'Dinner': [
                { name: 'Grilled Salmon', price: '$22.00', img: './Dinner/1.jpg' },
                { name: 'Steak Frites', price: '$28.00', img: './Dinner/1.jpg' },
                { name: 'Grilled Salmon', price: '$22.00', img: './Dinner/1.jpg' },
                { name: 'Steak Frites', price: '$28.00', img: './Dinner/1.jpg' },
                { name: 'Grilled Salmon', price: '$22.00', img: './Dinner/1.jpg' },
                { name: 'Steak Frites', price: '$28.00', img: './Dinner/1.jpg' },
            ],
            'Soft Drinks': [
                { name: 'Coca Cola', price: '$3.00', img: './Softdrink/1.jpg' },
                { name: 'Fresh Orange Juice', price: '$5.00', img: './Softdrink/1.jpg' },
                { name: 'Coca Cola', price: '$3.00', img: './Softdrink/1.jpg' },
                { name: 'Fresh Orange Juice', price: '$5.00', img: './Softdrink/1.jpg' },
                { name: 'Coca Cola', price: '$3.00', img: './Softdrink/1.jpg' },
                { name: 'Fresh Orange Juice', price: '$5.00', img: './Softdrink/1.jpg' },
            ],
            'Hot Drinks': [
                { name: 'Cappuccino', price: '$4.50', img: './Hotdrink/1.jpg' },
                { name: 'Earl Grey Tea', price: '$3.50', img: './Hotdrink/1.jpg' },
                { name: 'Cappuccino', price: '$4.50', img: './Hotdrink/1.jpg' },
                { name: 'Earl Grey Tea', price: '$3.50', img: './Hotdrink/1.jpg' },
                { name: 'Cappuccino', price: '$4.50', img: './Hotdrink/1.jpg' },
                { name: 'Earl Grey Tea', price: '$3.50', img: './Hotdrink/1.jpg' },
            ]
        };

        function showModal(category) {
            const modal = document.getElementById('categoryModal');
            const title = document.getElementById('modalTitle');
            const itemsContainer = document.getElementById('modalItems');

            title.innerText = category;
            itemsContainer.innerHTML = '';

            const items = menuData[category] || [];
            items.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'modal-item';
                itemEl.innerHTML = `
                    <img src="${item.img}" alt="${item.name}">
                    <div class="modal-item-info">
                        <p class="modal-item-name">${item.name}</p>
                        <p class="modal-item-price">${item.price}</p>
                    </div>
                    <button class="btn btn-primary btn-mini" style="width: auto;" onclick='placeOrder(${JSON.stringify(item)})'>Order</button>
                `;
                itemsContainer.appendChild(itemEl);
            });

            modal.style.display = 'flex';
        }

        async function placeOrder(item) {

            const orderNumber = Math.floor(1000 + Math.random() * 9000).toString();
            const order = {
                id: Date.now(),
                orderNumber: orderNumber,
                item: item.name,
                price: item.price,
                img: item.img,
                status: 'new',
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now()
            };

            try {
                const ordersRef = ref(db, 'orders');
                const newOrderRef = push(ordersRef);
                await set(newOrderRef, order);

                showToast(`✅ Order #${orderNumber} placed successfully!`);
                closeModal();

            } catch (error) {
                console.error("Error placing order:", error);
                showToast("❌ Failed to place order.");
            }
        }

        function showToast(message) {
            let toast = document.querySelector('.order-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'order-toast';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }


        function closeModal() {
            document.getElementById('categoryModal').style.display = 'none';
        }

        // Expose to global scope for HTML attributes
        window.showModal = showModal;
        window.placeOrder = placeOrder;
        window.closeModal = closeModal;


        // Close on overlay click
        window.onclick = function (event) {
            const modal = document.getElementById('categoryModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
