<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Bank - Digital Menu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="back-icon">←</div>
            <div class="menu-icon">☰</div>
        </header>

        <section class="hero">
            <!-- Using the generated hero banner -->
            <img src="./assets/hero_food_banner.png" alt="Different Kind of Food">
            <div class="hero-overlay">
                <h1 class="hero-title">Different<br>Kind of Food</h1>
            </div>
        </section>

        <section class="category-section">
            <div class="section-title">Food Category</div>
            <div class="grid-wrapper">
                <div class="card food-item-grid">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=200&auto=format&fit=crop"
                        alt="Burger" class="img-fluid">
                    <p class="text-sm">Food Name</p>
                    <p class="price text-sm">$ 300.00</p>
                    <button class="btn btn-primary btn-mini" onclick="location.href='items.html'">Add Cart</button>
                </div>
                <div class="card food-item-grid">
                    <img src="https://images.unsplash.com/photo-1621510456681-23a01ec36f57?q=80&w=200&auto=format&fit=crop"
                        alt="Egg" class="img-fluid">
                    <p class="text-sm">Food Name</p>
                    <p class="price text-sm">$ 300.00</p>
                    <button class="btn btn-primary btn-mini">Add Cart</button>
                </div>
                <div class="card food-item-grid">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=200&auto=format&fit=crop"
                        alt="Salad" class="img-fluid">
                    <p class="text-sm">Food Name</p>
                    <p class="price text-sm">$ 300.00</p>
                    <button class="btn btn-primary btn-mini">Add Cart</button>
                </div>
            </div>
        </section>

        <section class="category-section">
            <div class="section-title">Food Category</div>
            <div class="grid-wrapper">
                <div class="card food-item-grid">
                    <img src="https://images.unsplash.com/photo-1601924582970-9238bcb495d9?q=80&w=200&auto=format&fit=crop"
                        alt="Soup" class="img-fluid">
                    <p class="text-sm">Food Name</p>
                    <p class="price text-sm">$ 300.00</p>
                    <button class="btn btn-primary btn-mini">Add Cart</button>
                </div>
                <div class="card food-item-grid">
                    <img src="https://images.unsplash.com/photo-1517741991040-91338b176129?q=80&w=200&auto=format&fit=crop"
                        alt="Pancakes" class="img-fluid">
                    <p class="text-sm">Food Name</p>
                    <p class="price text-sm">$ 300.00</p>
                    <button class="btn btn-primary btn-mini">Add Cart</button>
                </div>
                <div class="card food-item-grid">
                    <img src="https://images.unsplash.com/photo-1473093226795-af9932fe5856?q=80&w=200&auto=format&fit=crop"
                        alt="Pasta" class="img-fluid">
                    <p class="text-sm">Food Name</p>
                    <p class="price text-sm">$ 300.00</p>
                    <button class="btn btn-primary btn-mini">Add Cart</button>
                </div>
            </div>
        </section>
        <section class="discount-banner">
            <div class="discount-text">
                <h2>15%<br><span style="font-size: 0.9rem; font-weight: 400;">Discount</span></h2>
                <p style="font-size: 0.7rem;">From Our Store</p>
            </div>
            <div class="discount-img">
                <img src="https://images.unsplash.com/photo-1517741991040-91338b176129?q=80&w=200&auto=format&fit=crop"
                    alt="Pancakes">
            </div>
        </section>
    </div>
</body>

</html>
